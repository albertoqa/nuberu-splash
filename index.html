<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Nuberu — Próximamente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #042C53;
      --blue:  #185FA5;
      --sky:   #378ADD;
      --amber: #EF9F27;
      --foam:  #B5D4F4;
    }

    body {
      background: var(--navy);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .frame {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-wordmark {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #fff;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #fff;
    }

    h1 em {
      font-style: normal;
      color: var(--amber);
    }

    .sub {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--foam);
      opacity: 0.85;
    }

    .horizon {
      height: 1px;
      background: rgba(55,138,221,0.25);
    }

    .notify label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--foam);
      opacity: 0.6;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="email"] {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    input[type="email"]::placeholder { color: rgba(255,255,255,0.3); }
    input[type="email"]:focus { border-color: var(--sky); }

    button {
      background: var(--amber);
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 11px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    .confirm {
      margin-top: 10px;
      font-size: 13px;
      color: var(--amber);
      display: none;
    }

    .footer {
      font-size: 12px;
      color: rgba(181,212,244,0.4);
    }
  </style>
</head>
<body>
  <div class="frame">

    <div class="logo">
      <svg width="88" height="88" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="4" y1="28" x2="40" y2="28" stroke="#378ADD" stroke-width="2" stroke-linecap="round"/>
        <circle cx="22" cy="28" r="8" fill="#EF9F27"/>
        <line x1="22" y1="12" x2="22" y2="15" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>
        <line x1="10.5" y1="16.5" x2="12.6" y2="18.6" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>
        <line x1="33.5" y1="16.5" x2="31.4" y2="18.6" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>
        <line x1="6"  y1="28" x2="9"  y2="28" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>
        <line x1="38" y1="28" x2="35" y2="28" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>
        <rect x="0" y="28" width="44" height="16" fill="#042C53"/>
        <line x1="4" y1="28" x2="40" y2="28" stroke="#378ADD" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="logo-wordmark">nuberu</span>
    </div>

    <div class="horizon"></div>

    <div class="notify">
      <label>Avísame cuando lancéis</label>
      <div class="input-row">
        <input type="email" id="email" placeholder="tu@correo.com" />
        <button id="btn" onclick="handleNotify()">Notifícame</button>
      </div>
      <p class="confirm" id="confirm">✓ Anotado — te avisamos en el lanzamiento.</p>
    </div>

    <p class="footer">nuberu.app &mdash; &copy; 2026</p>
  </div>

  <script>
    function handleNotify() {
      const input = document.getElementById('email');
      const confirm = document.getElementById('confirm');
      const btn = document.getElementById('btn');
      if (!input.value || !input.value.includes('@')) {
        input.style.borderColor = 'rgba(239,80,80,0.6)';
        input.focus();
        return;
      }
      input.style.borderColor = 'rgba(55,138,221,0.6)';
      input.disabled = true;
      btn.disabled = true;
      confirm.style.display = 'block';
    }
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleNotify();
    });
  </script>
</body>
</html>
